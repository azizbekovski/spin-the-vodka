<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Flaskspel Ultimate</title>

<style>
body {font-family:Arial;text-align:center;background:#111;color:white;}

#bottle {
    width:110px;height:210px;margin:20px auto;
    border-radius:15px;background:gold;
    box-shadow:0 0 25px gold;
    cursor:pointer;
    transition:0.1s;
}

/* animation */
.spin {animation:spin 0.3s linear infinite;}
@keyframes spin {
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

button {
    margin:4px;padding:6px;
    border:none;border-radius:8px;
    cursor:pointer;
}

.panel {
    background:#222;padding:10px;margin:10px;border-radius:10px;
}

.skin {
    width:40px;height:60px;margin:3px;
    display:inline-block;border:2px solid white;
    cursor:pointer;
}
.active {border:3px solid red;}
</style>
</head>

<body>

<h2>🔥 Flaskspel Ultimate</h2>

<div id="bottle" onclick="clickBottle()"></div>

<div id="score"></div>

<div class="panel">
<h3>🚀 Click Upgrades</h3>
<button onclick="buyClick(100,2)">+2 (100)</button>
<button onclick="buyClick(500,5)">+5 (500)</button>
<button onclick="buyClick(2000,20)">+20 (2k)</button>
<button onclick="buyClick(10000,100)">+100 (10k)</button>
<button onclick="buyClick(50000,500)">+500 (50k)</button>
</div>

<div class="panel">
<h3>🤖 Auto Upgrades</h3>
<button onclick="buyAuto(500,1)">+1/sec (500)</button>
<button onclick="buyAuto(2000,5)">+5/sec (2k)</button>
<button onclick="buyAuto(10000,20)">+20/sec (10k)</button>
<button onclick="buyAuto(50000,100)">+100/sec (50k)</button>
<button onclick="buyAuto(200000,500)">+500/sec (200k)</button>
</div>

<div class="panel">
<h3>🎁 Cases</h3>
<button onclick="openBasicCase()">📦 Basic (10k)</button>
<button onclick="openProCase()">💎 Pro (50k)</button>
</div>

<div class="panel">
<h3>🎒 Inventory</h3>
<div id="inventory"></div>
</div>

<!-- LJUD -->
<audio id="clickSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_1b5b0f84e7.mp3">
</audio>

<audio id="caseSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4e1c5bff9c.mp3">
</audio>

<script>

// DATA
let score=0;
let clickPower=1;
let auto=0;

let skins=["gold"];
let current="gold";

// CLICK
function clickBottle(){
    score += clickPower;

    let b=document.getElementById("bottle");
    b.style.transform="scale(1.1)";
    setTimeout(()=>b.style.transform="scale(1)",80);

    document.getElementById("clickSound").play();

    update();
}

// AUTO
setInterval(()=>{
    score += auto;
    update();
},1000);

// CLICK UPGRADES
function buyClick(cost,power){
    if(score>=cost){
        score-=cost;
        clickPower+=power;
        update();
    }
}

// AUTO UPGRADES
function buyAuto(cost,power){
    if(score>=cost){
        score-=cost;
        auto+=power;
        update();
    }
}

// CASES
function openBasicCase(){
    if(score<10000){alert("Inte tillräckligt!");return;}
    score-=10000;
    animateCase(["red","blue","green","yellow","orange"]);
}

function openProCase(){
    if(score<50000){alert("Inte tillräckligt!");return;}
    score-=50000;
    animateCase(["purple","pink","cyan","lime","white","gold"]);
}

// ANIMATION
function animateCase(colors){
    let b=document.getElementById("bottle");
    b.classList.add("spin");

    document.getElementById("caseSound").play();

    let interval=setInterval(()=>{
        let c=colors[Math.floor(Math.random()*colors.length)];
        b.style.background=c;
    },100);

    setTimeout(()=>{
        clearInterval(interval);
        b.classList.remove("spin");

        let reward=colors[Math.floor(Math.random()*colors.length)];
        addSkin(reward);
    },1500);
}

// SKINS
function addSkin(color){
    if(!skins.includes(color)){
        skins.push(color);
    }

    current=color;
    applySkin();
    renderInventory();
}

// APPLY
function applySkin(){
    let b=document.getElementById("bottle");
    b.style.background=current;
    b.style.boxShadow="0 0 25px "+current;
}

// INVENTORY
function renderInventory(){
    let inv=document.getElementById("inventory");
    inv.innerHTML="";

    skins.forEach(s=>{
        let d=document.createElement("div");
        d.className="skin";
        d.style.background=s;

        if(s===current) d.classList.add("active");

        d.onclick=()=>{
            current=s;
            applySkin();
            renderInventory();
        };

        inv.appendChild(d);
    });
}

// UPDATE
function update(){
    document.getElementById("score").innerText=
    "Poäng: "+Math.floor(score)+" | Click: "+clickPower+" | Auto: "+auto;
}

// SAVE
setInterval(()=>{
    localStorage.setItem("save",JSON.stringify({
        score,clickPower,auto,skins,current
    }));
},3000);

// LOAD
let save=JSON.parse(localStorage.getItem("save")||"null");

if(save){
    score=save.score||0;
    clickPower=save.clickPower||1;
    auto=save.auto||0;
    skins=save.skins||["gold"];
    current=save.current||"gold";
}

applySkin();
renderInventory();
update();

</script>

</body>
</html>
