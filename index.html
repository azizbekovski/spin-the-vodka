<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Flaskspel PRO MAX</title>

<style>
body {
    font-family:Arial;
    text-align:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

#bottle {
    width:110px;
    height:210px;
    margin:25px auto;
    border-radius:15px;
    background:gold;
    box-shadow:0 0 25px gold;
    cursor:pointer;
    transition:0.1s;
}

.panel {
    background:rgba(255,255,255,0.05);
    padding:10px;
    margin:10px;
    border-radius:12px;
}

button {
    margin:4px;
    padding:6px 10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.skin {
    width:35px;
    height:50px;
    margin:3px;
    display:inline-block;
    border:2px solid white;
}
.active {border:3px solid red;}
</style>
</head>

<body>

<h2>🔥 Flaskspel PRO MAX</h2>

<div id="bottle" onclick="clickBottle()"></div>

<div id="score"></div>
<div id="stats"></div>

<div class="panel">
<h3>🚀 Upgrades</h3>
<div id="upgrades"></div>
</div>

<div class="panel">
<h3>🤖 Auto</h3>
<div id="autos"></div>
</div>

<div class="panel">
<button onclick="bonus()">⚡ x2</button>
<button onclick="daily()">🎁 Daily</button>
<button onclick="toggleTheme()">🎨 Theme</button>
<button onclick="prestige()">💎 Prestige</button>
</div>

<div class="panel">
<h3>🎒 Skins (<span id="skinCount"></span>)</h3>
<div id="inventory"></div>
</div>

<script>

// DATA
let score=0;
let clickPower=1;
let auto=0;
let prestigeMulti=1;
let combo=0;
let level=1;
let time=0;
let dark=true;

let skins=["gold"];
let current="gold";

let upgrades=[];
let autos=[];

// GENERATE upgrades
for(let i=1;i<=30;i++){
    upgrades.push({cost:i*100,power:i*4});
}

// GENERATE autos
for(let i=1;i<=20;i++){
    autos.push({cost:i*1000,power:i*2});
}

// CLICK
function clickBottle(){
    let gain=clickPower*prestigeMulti;

    combo++;
    if(combo>10) gain*=2;

    // critical chance
    if(Math.random()<0.1) gain*=3;

    score+=gain;

    animate();
    update();
}

// ANIMATION
function animate(){
    let b=document.getElementById("bottle");
    b.style.transform="scale(1.1)";
    setTimeout(()=>b.style.transform="scale(1)",80);
}

// AUTO
setInterval(()=>{
    score+=auto*prestigeMulti;

    // random event
    if(Math.random()<0.05){
        score+=1000;
    }

    time++;
    update();
},1000);

// BONUS
function bonus(){
    let old=clickPower;
    clickPower*=2;
    setTimeout(()=>clickPower=old,10000);
}

// DAILY
function daily(){
    score+=5000;
}

// PRESTIGE
function prestige(){
    if(score>=100000){
        score=0;
        clickPower=1;
        auto=0;
        prestigeMulti+=0.5;
    }
}

// THEME
function toggleTheme(){
    dark=!dark;
    document.body.style.background=dark?"#0f172a":"#eee";
    document.body.style.color=dark?"white":"black";
}

// UPGRADES
function renderUpgrades(){
    let div=document.getElementById("upgrades");
    div.innerHTML="";

    upgrades.forEach(u=>{
        let b=document.createElement("button");
        b.innerText="+"+u.power+" ("+u.cost+")";

        b.onclick=()=>{
            if(score>=u.cost){
                score-=u.cost;
                clickPower+=u.power;
                u.cost*=1.4;
                renderUpgrades();
                update();
            }
        };

        div.appendChild(b);
    });
}

// AUTOS
function renderAutos(){
    let div=document.getElementById("autos");
    div.innerHTML="";

    autos.forEach(a=>{
        let b=document.createElement("button");
        b.innerText="+"+a.power+"/s ("+a.cost+")";

        b.onclick=()=>{
            if(score>=a.cost){
                score-=a.cost;
                auto+=a.power;
                a.cost*=1.5;
                renderAutos();
                update();
            }
        };

        div.appendChild(b);
    });
}

// SKINS
function renderInventory(){
    let inv=document.getElementById("inventory");
    inv.innerHTML="";
    document.getElementById("skinCount").innerText=skins.length;

    skins.forEach(s=>{
        let d=document.createElement("div");
        d.className="skin";
        d.style.background=s;

        if(s===current) d.classList.add("active");

        d.onclick=()=>{
            current=s;
            applySkin();
            renderInventory();
        };

        inv.appendChild(d);
    });
}

// APPLY SKIN
function applySkin(){
    let b=document.getElementById("bottle");
    b.style.background=current;
    b.style.boxShadow="0 0 25px "+current;
}

// UPDATE
function update(){
    level=Math.floor(score/1000)+1;

    document.getElementById("score").innerText="Poäng: "+Math.floor(score);
    document.getElementById("stats").innerText=
        "Level: "+level+
        " | Auto: "+auto+
        " | Combo: "+combo+
        " | Prestige: x"+prestigeMulti+
        " | Tid: "+time+"s";
}

// SAVE
setInterval(()=>{
    localStorage.setItem("save",JSON.stringify({
        score,clickPower,auto,skins,current,prestigeMulti
    }));
},3000);

// LOAD
let save=JSON.parse(localStorage.getItem("save")||"null");

if(save){
    score=save.score||0;
    clickPower=save.clickPower||1;
    auto=save.auto||0;
    skins=save.skins||["gold"];
    current=save.current||"gold";
    prestigeMulti=save.prestigeMulti||1;
}

applySkin();
renderInventory();
renderUpgrades();
renderAutos();
update();

</script>

</body>
</html>
