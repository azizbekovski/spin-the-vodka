<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flaskspel</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        #bottle {
            width: 100px;
            height: 200px;
            background-color: #ffcc00;
            border-radius: 10px;
            transition: transform 0.2s;
        }
        #upgrades {
            margin-top: 20px;
        }
        button {
            margin: 5px;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div id="bottle" onclick="spinBottle()"></div>
    <div id="score">Poäng: 0</div>

    <div id="upgrades">
        <button onclick="buyUpgrade1()">+1 (10)</button>
        <button onclick="buyUpgrade2()">+5 (20)</button>
        <button onclick="buyUpgrade3()">+15 (50)</button>
        <button onclick="buyUpgrade4()">+25 (100)</button>
        <button onclick="buyUpgrade5()">+50 (200)</button>
    </div>

    <script>
        let score = 0;
        let spinSpeed = 1;

        // 🔊 Ljud
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playClickSound() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = "square";
            oscillator.frequency.value = 600;

            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function updateScore() {
            document.getElementById('score').innerText = "Poäng: " + score;
        }

        function spinBottle() {
            playClickSound();

            score += spinSpeed;
            updateScore();

            const bottle = document.getElementById('bottle');
            bottle.style.transform = "rotate(" + (Math.random() * 360) + "deg)";
        }

        function buyUpgrade1() {
            if (score >= 10) {
                score -= 10;
                spinSpeed += 1;
                updateScore();
            }
        }

        function buyUpgrade2() {
            if (score >= 20) {
                score -= 20;
                spinSpeed += 5;
                updateScore();
            }
        }

        function buyUpgrade3() {
            if (score >= 50) {
                score -= 50;
                spinSpeed += 15;
                updateScore();
            }
        }

        function buyUpgrade4() {
            if (score >= 100) {
                score -= 100;
                spinSpeed += 25;
                updateScore();
            }
        }

        function buyUpgrade5() {
            if (score >= 200) {
                score -= 200;
                spinSpeed += 50;
                updateScore();
            }
        }
    </script>

</body>
</html>
