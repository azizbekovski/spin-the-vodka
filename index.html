<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Spinning Vodka Bottle Game</title><style>*{margin:0;padding:0;box-sizing:border-box}body{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);font-family:Arial,sans-serif}#lobby{text-align:center;background:white;padding:50px;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,0.2)}#lobby h1{color:#333;margin-bottom:20px;font-size:32px}#lobby p{color:#666;margin-bottom:30px;font-size:16px}.startButton{padding:12px 30px;font-size:18px;background-color:#667eea;color:white;border:none;border-radius:5px;cursor:pointer;transition:background-color 0.3s}.startButton:hover{background-color:#764ba2}#gameScreen{display:none;text-align:center;background:white;padding:50px;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,0.2)}#gameScreen h1{color:#333;margin-bottom:30px;font-size:32px}#bottleContainer{width:300px;height:400px;margin:30px auto;display:flex;align-items:center;justify-content:center;perspective:1000px}.bottle{width:150px;height:300px;background:linear-gradient(90deg,#1a472a 0%,#2d5f3f 25%,#1a472a 50%,#2d5f3f 75%,#1a472a 100%);border-radius:50px 50px 80px 80px;position:relative;box-shadow:inset -5px 0 10px rgba(0,0,0,0.5),inset 5px 0 10px rgba(255,255,255,0.2);transition:transform 0.05s linear}.bottle::before{content:'';position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:40px;height:25px;background:linear-gradient(to bottom,#8B4513 0%,#654321 100%);border-radius:5px;box-shadow:0 2px 5px rgba(0,0,0,0.5)}.bottle::after{content:'';position:absolute;top:10px;left:15px;width:30px;height:120px;background:linear-gradient(to right,rgba(255,255,255,0.3) 0%,rgba(255,255,255,0) 100%);border-radius:50px}.spinGameButton{padding:12px 40px;font-size:18px;background-color:#667eea;color:white;border:none;border-radius:5px;cursor:pointer;transition:background-color 0.3s;margin-top:20px}.spinGameButton:hover:not(:disabled){background-color:#764ba2}.spinGameButton:disabled{background-color:#ccc;cursor:not-allowed}.backButton{padding:10px 20px;font-size:14px;background-color:#e74c3c;color:white;border:none;border-radius:5px;cursor:pointer;margin-top:30px;transition:background-color 0.3s}.backButton:hover{background-color:#c0392b}.message{font-size:18px;color:#333;margin-top:20px;min-height:30px}.hidden{display:none}</style></head><body><div id="lobby"><h1>🍾 Spinning Vodka Bottle Game 🍾</h1><p>Are you ready to spin?</p><button class="startButton" onclick="goToGame()">Start Game</button></div><div id="gameScreen"><h1>Spin The Bottle!</h1><div id="bottleContainer"><div class="bottle" id="bottle"></div></div><button class="spinGameButton" id="spinGameButton" onclick="spinBottle()">SPIN</button><div class="message" id="message"></div><button class="backButton" onclick="goToLobby()">Back to Lobby</button></div><script>let isSpinning=false;let currentRotation=0;let spinAnimationId=null;function goToGame(){document.getElementById('lobby').classList.add('hidden');document.getElementById('gameScreen').classList.remove('hidden');document.getElementById('message').textContent=''}function goToLobby(){document.getElementById('gameScreen').classList.add('hidden');document.getElementById('lobby').classList.remove('hidden');isSpinning=false;document.getElementById('spinGameButton').disabled=false;if(spinAnimationId){cancelAnimationFrame(spinAnimationId)}}function spinBottle(){if(isSpinning)return;isSpinning=true;const button=document.getElementById('spinGameButton');const bottle=document.getElementById('bottle');const message=document.getElementById('message');button.disabled=true;message.textContent='Spinning...';const finalAngle=Math.random()*360;const spinDuration=3000;const startTime=Date.now();const spinSpeed=1080;function animate(){const elapsed=Date.now()-startTime;const progress=Math.min(elapsed/spinDuration,1);const easeProgress=1-Math.pow(1-progress,3);const rotation=currentRotation+(spinSpeed*easeProgress);bottle.style.transform='rotateZ('+rotation+'deg)';if(progress<1){spinAnimationId=requestAnimationFrame(animate)}else{currentRotation=(currentRotation+spinSpeed)%360;bottle.style.transform='rotateZ('+currentRotation+'deg)';message.textContent='Bottle stopped! 🎉';isSpinning=false;button.disabled=false}}spinAnimationId=requestAnimationFrame(animate)}</script></body></html>
