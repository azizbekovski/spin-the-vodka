<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Vodka Spin</title>

<style>
body {
    background: #000;
    color: #00ff88;
    text-align: center;
    font-family: Arial;
}

h1 {
    text-shadow: 0 0 10px #00ff88;
}

.arena {
    position: relative;
    width: 400px;
    height: 400px;
    margin: 20px auto;
    border: 2px solid #00ff88;
    border-radius: 20px;
    box-shadow: 0 0 20px #00ff88;
}

.player {
    position: absolute;
    width: 100px;
    font-weight: bold;
    transition: 0.3s;
}

.highlight {
    color: #fff;
    text-shadow: 0 0 15px #00ff88, 0 0 30px #00ff88;
}

.top-left { top: 10px; left: 10px; }
.top-right { top: 10px; right: 10px; }
.bottom-left { bottom: 10px; left: 10px; }
.bottom-right { bottom: 10px; right: 10px; }

.bottle {
    width: 60px;
    height: 150px;
    background: linear-gradient(#00ff88, #004422);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transform-origin: center;
    transition: transform 2s ease-out;
    border-radius: 20px;
    box-shadow: 0 0 15px #00ff88;
}

input, button {
    margin: 5px;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

button {
    background: #00ff88;
    color: black;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #00cc66;
}
</style>
</head>

<body>

<h1>🐻 Vodka Spin</h1>

<div>
    <input id="p1" placeholder="Spelare 1">
    <input id="p2" placeholder="Spelare 2"><br>
    <input id="p3" placeholder="Spelare 3">
    <input id="p4" placeholder="Spelare 4"><br>
    <button onclick="setNames()">Sätt namn</button>
</div>

<div class="arena">
    <div id="player0" class="player top-left"></div>
    <div id="player1" class="player top-right"></div>
    <div id="player2" class="player bottom-left"></div>
    <div id="player3" class="player bottom-right"></div>

    <div id="bottle" class="bottle"></div>
</div>

<button onclick="spinBottle()">Snurra flaskan</button>

<!-- 🔊 Ljud -->
<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<script>
let players = ["", "", "", ""];

function setNames() {
    players[0] = document.getElementById("p1").value;
    players[1] = document.getElementById("p2").value;
    players[2] = document.getElementById("p3").value;
    players[3] = document.getElementById("p4").value;

    for (let i = 0; i < 4; i++) {
        document.getElementById("player" + i).innerText = players[i];
    }
}

function spinBottle() {
    const bottle = document.getElementById("bottle");

    // ta bort highlight
    for (let i = 0; i < 4; i++) {
        document.getElementById("player" + i).classList.remove("highlight");
    }

    const index = Math.floor(Math.random() * 4);
    const angles = [225, 315, 135, 45];

    const deg = 720 + angles[index];

    bottle.style.transform =
        "translate(-50%, -50%) rotate(" + deg + "deg)";

    setTimeout(() => {
        // highlight vinnaren
        document.getElementById("player" + index).classList.add("highlight");

        // spela ljud
        document.getElementById("sound").play();

        alert("🎯 Vald: " + (players[index] || "Ingen"));
    }, 2000);
}
</script>

</body>
</html>
