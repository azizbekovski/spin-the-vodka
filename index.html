<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Flaskspel Deluxe</title>

<style>
body {
    margin:0;
    font-family:Arial;
    text-align:center;
    background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
    color:white;
}

/* BOTTLE */
#bottle {
    width:100px;
    height:200px;
    margin:30px auto;
    border-radius:15px;
    background:gold;
    cursor:pointer;
    box-shadow:0 0 20px gold;
    transition:0.1s;
}

#bottle:hover {
    transform:scale(1.1);
}

/* PANELS */
.panel {
    background:rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    padding:10px;
    margin:10px;
    border-radius:15px;
}

/* BUTTONS */
button {
    margin:5px;
    padding:8px 12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(45deg,#ff7b00,#ffcc00);
    color:black;
    font-weight:bold;
    transition:0.2s;
}

button:hover {
    transform:scale(1.1);
}

/* SKINS */
.skin {
    width:40px;
    height:60px;
    margin:4px;
    display:inline-block;
    border:2px solid white;
    border-radius:5px;
    cursor:pointer;
}

.active {
    border:3px solid red;
}

/* PROGRESS */
#progress {
    height:20px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
    margin:10px;
}

#bar {
    height:100%;
    width:0%;
    background:lime;
}
</style>
</head>

<body>

<h2>🔥 Flaskspel Deluxe</h2>

<div id="bottle" onclick="clickBottle()"></div>

<div id="score">0</div>
<div id="level">Level 1</div>

<div id="progress"><div id="bar"></div></div>

<div class="panel">
<h3>🚀 Upgrades</h3>
<div id="upgrades"></div>
</div>

<div class="panel">
<h3>🤖 Auto</h3>
<button onclick="buyAuto()">Köp Auto</button>
</div>

<div class="panel">
<h3>🎁 Case</h3>
<button onclick="openCase()">Öppna (50k)</button>
</div>

<div class="panel">
<h3>🎒 Inventory</h3>
<div id="inventory"></div>
</div>

<div class="panel">
<button onclick="bonus()">⚡ x2 Bonus</button>
<button onclick="toggleMusic()">🎵 Musik On/Off</button>
</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6b8f3f6d0b.mp3?filename=lofi-study-112191.mp3" type="audio/mpeg">
</audio>

<script>

// DATA
let score=0;
let clickPower=1;
let auto=0;
let level=1;
let musicOn=false;

let skins=["gold"];
let current="gold";

let upgrades=[];

// GENERATE 50 upgrades
for(let i=1;i<=50;i++){
    upgrades.push({
        cost:i*50,
        power:i
    });
}

// CLICK
function clickBottle(){
    score += clickPower;

    // animation
    let b=document.getElementById("bottle");
    b.style.transform="scale(1.2)";
    setTimeout(()=>b.style.transform="scale(1)",100);

    update();
}

// AUTO
setInterval(()=>{
    score += auto;
    update();
},1000);

// BONUS
function bonus(){
    let old=clickPower;
    clickPower*=2;
    setTimeout(()=>clickPower=old,10000);
}

// AUTO BUY
function buyAuto(){
    let cost=1000+auto*500;
    if(score>=cost){
        score-=cost;
        auto+=1;
    }
}

// UPGRADES
function renderUpgrades(){
    let div=document.getElementById("upgrades");
    div.innerHTML="";

    upgrades.forEach(u=>{
        let b=document.createElement("button");
        b.innerText="+"+u.power+" ("+u.cost+")";

        b.onclick=()=>{
            if(score>=u.cost){
                score-=u.cost;
                clickPower+=u.power;
                u.cost=Math.floor(u.cost*1.4);
                renderUpgrades();
                update();
            }
        };

        div.appendChild(b);
    });
}

// CASE
function openCase(){
    if(score<50000) return;

    score-=50000;

    let colors=["red","blue","green","purple","orange","pink"];
    let reward=colors[Math.floor(Math.random()*colors.length)];

    if(!skins.includes(reward)) skins.push(reward);

    current=reward;
    applySkin();
    renderInventory();
}

// SKIN
function applySkin(){
    let b=document.getElementById("bottle");
    b.style.background=current;
    b.style.boxShadow="0 0 20px "+current;
}

// INVENTORY
function renderInventory(){
    let inv=document.getElementById("inventory");
    inv.innerHTML="";

    skins.forEach(s=>{
        let d=document.createElement("div");
        d.className="skin";
        d.style.background=s;

        if(s===current) d.classList.add("active");

        d.onclick=()=>{
            current=s;
            applySkin();
            renderInventory();
        };

        inv.appendChild(d);
    });
}

// MUSIC
function toggleMusic(){
    let music=document.getElementById("bgMusic");
    if(musicOn){
        music.pause();
    } else {
        music.play();
    }
    musicOn=!musicOn;
}

// UPDATE
function update(){
    level=Math.floor(score/1000)+1;

    document.getElementById("score").innerText="Poäng: "+Math.floor(score);
    document.getElementById("level").innerText="Level "+level;

    let percent=(score%1000)/10;
    document.getElementById("bar").style.width=percent+"%";
}

// SAVE
setInterval(()=>{
    localStorage.setItem("save",JSON.stringify({
        score,clickPower,auto,skins,current,upgrades
    }));
},3000);

// LOAD
let save=JSON.parse(localStorage.getItem("save")||"null");

if(save){
    score=save.score||0;
    clickPower=save.clickPower||1;
    auto=save.auto||0;
    skins=save.skins||["gold"];
    current=save.current||"gold";
    upgrades=save.upgrades||upgrades;
}

applySkin();
renderInventory();
renderUpgrades();
update();

</script>

</body>
</html>
