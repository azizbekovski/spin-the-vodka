<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Flaskspel 300+ GOD SYSTEM</title>

<style>
body {font-family:Arial; text-align:center; background:#111; color:white;}
#bottle {width:100px;height:200px;margin:20px auto;border-radius:10px;background:gold;}
button {margin:4px;padding:6px;border-radius:6px;border:none;}
.panel {background:#222;padding:10px;margin:10px;border-radius:10px;}
.skin {width:40px;height:60px;margin:3px;display:inline-block;border:2px solid white;}
.active {border:3px solid red;}
</style>
</head>

<body>

<h2>🔥 Flaskspel 300+ MODE</h2>

<div id="bottle" onclick="clickBottle()"></div>

<div id="score"></div>
<div id="stats"></div>

<div class="panel">
<h3>🚀 Dynamiska Upgrades</h3>
<div id="upgrades"></div>
</div>

<div class="panel">
<h3>🤖 Auto</h3>
<div id="autos"></div>
</div>

<div class="panel">
<h3>🎁 Case</h3>
<button onclick="openCase()">Öppna (50k)</button>
</div>

<div class="panel">
<h3>🎒 Inventory (300+ skins)</h3>
<div id="inventory"></div>
</div>

<button onclick="prestige()">💎 Prestige</button>

<script>

// CORE
let score=0;
let clickPower=1;
let auto=0;
let prestige=1;

// SYSTEMS
let skins=["gold"];
let current="gold";

// GENERATE 50+ upgrades
let upgrades=[];
for(let i=1;i<=50;i++){
    upgrades.push({
        cost: i*100,
        power: i*2
    });
}

// GENERATE 20 auto upgrades
let autos=[];
for(let i=1;i<=20;i++){
    autos.push({
        cost: i*1000,
        power: i*5
    });
}

// RENDER UPGRADES
function renderUpgrades(){
    let div=document.getElementById("upgrades");
    div.innerHTML="";
    upgrades.forEach(u=>{
        let b=document.createElement("button");
        b.innerText="+"+u.power+" ("+u.cost+")";
        b.onclick=()=>{
            if(score>=u.cost){
                score-=u.cost;
                clickPower+=u.power;
                u.cost*=1.5;
                update();
                renderUpgrades();
            }
        };
        div.appendChild(b);
    });
}

// RENDER AUTOS
function renderAutos(){
    let div=document.getElementById("autos");
    div.innerHTML="";
    autos.forEach(a=>{
        let b=document.createElement("button");
        b.innerText="+"+a.power+"/s ("+a.cost+")";
        b.onclick=()=>{
            if(score>=a.cost){
                score-=a.cost;
                auto+=a.power;
                a.cost*=1.7;
                update();
                renderAutos();
            }
        };
        div.appendChild(b);
    });
}

// CLICK
function clickBottle(){
    score+=clickPower*prestige;
    update();
}

// AUTO LOOP
setInterval(()=>{
    score+=auto*prestige;
    randomEvent();
    update();
},1000);

// RANDOM EVENTS = MASSOR
function randomEvent(){
    let r=Math.random();
    if(r<0.1) score+=1000;
    if(r<0.05) clickPower+=5;
    if(r<0.02) auto+=10;
}

// CASE → GENERATE SKINS
function openCase(){
    if(score<50000) return;
    score-=50000;

    let color="hsl("+Math.random()*360+",70%,50%)";

    skins.push(color);
    current=color;
    renderInventory();
}

// INVENTORY
function renderInventory(){
    let inv=document.getElementById("inventory");
    inv.innerHTML="";
    skins.forEach(s=>{
        let d=document.createElement("div");
        d.className="skin";
        d.style.background=s;

        if(s===current) d.classList.add("active");

        d.onclick=()=>{
            current=s;
            document.getElementById("bottle").style.background=s;
            renderInventory();
        };

        inv.appendChild(d);
    });
}

// PRESTIGE
function prestige(){
    if(score>=100000){
        score=0;
        clickPower=1;
        auto=0;
        prestige+=0.5;
    }
}

// UPDATE
function update(){
    document.getElementById("score").innerText="Poäng: "+Math.floor(score);
    document.getElementById("stats").innerText=
        "Click: "+clickPower+
        " | Auto: "+auto+
        " | Prestige: x"+prestige+
        " | Skins: "+skins.length;
}

// SAVE AUTO
setInterval(()=>{
    localStorage.setItem("save",JSON.stringify({
        score,clickPower,auto,skins,current,prestige
    }));
},3000);

// LOAD
let save=JSON.parse(localStorage.getItem("save")||"{}");
score=save.score||0;
clickPower=save.clickPower||1;
auto=save.auto||0;
skins=save.skins||["gold"];
current=save.current||"gold";
prestige=save.prestige||1;

document.getElementById("bottle").style.background=current;

renderUpgrades();
renderAutos();
renderInventory();
update();

</script>

</body>
</html>
