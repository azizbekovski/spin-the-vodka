<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Vodka Spin Lobby</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #1e1e2f;
        color: white;
        text-align: center;
    }

    .lobby {
        padding: 20px;
    }

    .bear {
        font-size: 80px;
        margin: 20px;
    }

    .bottle-container {
        margin-top: 40px;
    }

    .bottle {
        width: 80px;
        height: 200px;
        background: linear-gradient(to bottom, #4fc3f7, #0288d1);
        border-radius: 20px;
        margin: 0 auto;
        position: relative;
        transition: transform 2s ease-out;
    }

    .bottle::before {
        content: "";
        position: absolute;
        top: -30px;
        left: 25px;
        width: 30px;
        height: 30px;
        background: #ccc;
        border-radius: 5px;
    }

    button {
        margin-top: 30px;
        padding: 10px 20px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #ff5252;
        color: white;
    }

    button:hover {
        background: #ff1744;
    }
</style>
</head>
<body>

<div class="lobby">
    <h1>🍸 Vodka Lobby</h1>
    <div class="bear">🐻🇷🇺</div>
    <p>Välkommen till lobbyn!</p>

    <div class="bottle-container">
        <div id="bottle" class="bottle"></div>
        <button onclick="spinBottle()">Snurra flaskan</button>
    </div>
</div>

<script>
function spinBottle() {
    const bottle = document.getElementById("bottle");

    // slumpmässig rotation (minst 2 varv)
    const randomDeg = Math.floor(Math.random() * 360) + 720;

    bottle.style.transform = "rotate(" + randomDeg + "deg)";
}
</script>

</body>
</html>
