<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flaskspel med Case</title>
<style>
body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Arial;
    background: linear-gradient(to right, #4facfe, #00f2fe);
}

#bottle {
    width: 100px;
    height: 200px;
    background-color: #ffcc00;
    border-radius: 10px;
    transition: transform 0.2s;
    position: relative;
}

#score {
    font-size: 24px;
    color: white;
    margin: 10px;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#rewardImg {
    position: absolute;
    top: -150px;
    width: 150px;
    display: none;
}
</style>
</head>
<body>

<div id="bottle"></div>
<div id="score">Poäng: 0</div>

<div id="upgrades">
    <button onclick="buyUpgrade(10,1)">+1 (10)</button>
    <button onclick="buyUpgrade(20,5)">+5 (20)</button>
    <button onclick="buyUpgrade(50,15)">+15 (50)</button>
    <button onclick="buyUpgrade(100,25)">+25 (100)</button>
    <button onclick="buyUpgrade(200,50,true)">+50 (200)</button>
</div>

<div id="lootbox">
    <h3>🎁 Case</h3>
    <button onclick="openCase(67000)">Öppna Case (67k)</button>
</div>

<script>
let score = 0;
let spinSpeed = 1;
let currentSkin = "yellow";
let ownedSkins = ["yellow"];

// Uppdatera poäng
function updateScore() {
    document.getElementById("score").innerText = "Poäng: " + score;
}

// Köp uppgradering
function buyUpgrade(cost, power, reward=false) {
    if(score >= cost) {
        score -= cost;
        spinSpeed += power;
        updateScore();
        if(reward) showReward();
    } else {
        alert("Inte tillräckligt med poäng!");
    }
}

// Belöningsbild för vanliga uppgraderingar
function showReward() {
    const bottle = document.getElementById("bottle");
    bottle.style.boxShadow = "0 0 20px gold";
    setTimeout(()=>{ bottle.style.boxShadow = "none"; }, 2000);
}

// 🎁 Lootbox
function openCase(cost) {
    if(score < cost) {
        alert("Inte tillräckligt med poäng!");
        return;
    }

    score -= cost;
    updateScore();

    const skins = ["whiteGlow", "blue", "red"];
    const reward = skins[Math.floor(Math.random() * skins.length)];

    currentSkin = reward;
    if(!ownedSkins.includes(reward)) ownedSkins.push(reward);

    applySkin(reward);

    alert("Du fick en " + reward + " flask-skin!");
}

// Applicera skin på flaskan
function applySkin(skin) {
    const bottle = document.getElementById("bottle");
    bottle.style.boxShadow = "none";

    if(skin === "whiteGlow") {
        bottle.style.backgroundColor = "white";
        bottle.style.boxShadow = "0 0 30px white";
    } else if(skin === "blue") {
        bottle.style.backgroundColor = "blue";
    } else if(skin === "red") {
        bottle.style.backgroundColor = "red";
    } else {
        bottle.style.backgroundColor = "#ffcc00";
    }
}

// Spara och ladda spelet
function saveGame() {
    localStorage.setItem("score", score);
    localStorage.setItem("speed", spinSpeed);
    localStorage.setItem("skin", currentSkin);
    localStorage.setItem("owned", JSON.stringify(ownedSkins));
    alert("Spelet sparat!");
}

function loadGame() {
    const s = localStorage.getItem("score");
    const sp = localStorage.getItem("speed");
    const sk = localStorage.getItem("skin");
    const ow = localStorage.getItem("owned");

    if(s) score = parseInt(s);
    if(sp) spinSpeed = parseInt(sp);
    if(sk) currentSkin = sk;
    if(ow) ownedSkins = JSON.parse(ow);

    updateScore();
    applySkin(currentSkin);
}

loadGame();
</script>
</body>
</html>
