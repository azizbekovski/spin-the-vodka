<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flaskspel GOD MODE</title>

<style>
body {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    font-family:Arial;
    background:linear-gradient(to right,#4facfe,#00f2fe);
}

#bottle {
    width:100px;
    height:200px;
    border-radius:10px;
    background:#ffcc00;
    transition:0.2s;
}

#score, #stats {
    color:white;
    font-size:20px;
    margin:5px;
}

button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.shop {
    margin-top:10px;
    background:rgba(255,255,255,0.2);
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="bottle" onclick="spinBottle()"></div>
<div id="score">Poäng: 0</div>
<div id="stats">Clicks/sec: 0</div>

<!-- 🚀 UPGRADES -->
<div class="shop">
<h3>🚀 Upgrades</h3>
<button onclick="buyUpgrade(10,1)">+1 (10)</button>
<button onclick="buyUpgrade(50,15)">+15 (50)</button>
<button onclick="buyUpgrade(200,50)">+50 (200)</button>
<button onclick="buyUpgrade(500,100)">+100 (500)</button>
<button onclick="buyUpgrade(2000,500)">+500 (2000)</button>
<button onclick="buyAuto()">🤖 Auto +10/sec (1000)</button>
</div>

<!-- 🎨 SHOP -->
<div class="shop">
<h3>🎨 Shop</h3>
<button onclick="buySkin('green',15000)">Grön</button>
<button onclick="buySkin('pink',20000)">Rosa</button>
<button onclick="buySkin('black',25000)">Svart</button>
<button onclick="buySkin('orange',30000)">Orange</button>
</div>

<button onclick="dailyReward()">🎁 Daily Reward</button>
<button onclick="saveGame()">💾 Spara</button>

<script>
let score = 0;
let spinSpeed = 1;
let autoSpeed = 0;
let currentSkin = "yellow";
let ownedSkins = ["yellow"];
let achievements = [];

// 🔊 ljud
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function clickSound(){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 600;
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.1);
    osc.start();
    osc.stop(audioCtx.currentTime+0.1);
}

function updateUI(){
    document.getElementById("score").innerText = "Poäng: " + score;
    document.getElementById("stats").innerText = "Clicks/sec: " + autoSpeed;
}

// 🎮 CLICK + CRITICAL
function spinBottle(){
    clickSound();

    let multiplier = currentSkin !== "yellow" ? 2 : 1;

    // 💥 critical hit
    let crit = Math.random() < 0.1 ? 5 : 1;

    if(crit > 1){
        alert("💥 CRITICAL HIT x5!");
    }

    score += spinSpeed * multiplier * crit;

    updateUI();

    document.getElementById("bottle").style.transform =
        "rotate("+(Math.random()*360)+"deg)";

    checkAchievements();
}

// 🤖 AUTO
setInterval(()=>{
    let multiplier = currentSkin !== "yellow" ? 2 : 1;
    score += autoSpeed * multiplier;
    updateUI();
},1000);

// 🚀 upgrades
function buyUpgrade(cost,power){
    if(score>=cost){
        score-=cost;
        spinSpeed+=power;
        updateUI();
    }
}

// 🤖 auto upgrade
function buyAuto(){
    if(score>=1000){
        score-=1000;
        autoSpeed+=10;
        updateUI();
    }
}

// 🎨 skins
function applySkin(skin){
    const b=document.getElementById("bottle");
    b.style.boxShadow="none";

    if(skin==="green") b.style.background="green";
    else if(skin==="pink") b.style.background="pink";
    else if(skin==="black"){
        b.style.background="black";
        b.style.boxShadow="0 0 20px white";
    }
    else if(skin==="orange"){
        b.style.background="orange";
        b.style.boxShadow="0 0 20px orange";
    }
    else b.style.background="#ffcc00";
}

// 🛒 köp skin
function buySkin(color,cost){
    if(ownedSkins.includes(color)){
        currentSkin=color;
        applySkin(color);
        return;
    }

    if(score>=cost){
        score-=cost;
        ownedSkins.push(color);
        currentSkin=color;
        updateUI();
        applySkin(color);
    }
}

// 🏆 achievements
function checkAchievements(){
    if(score>=1000 && !achievements.includes("1000")){
        achievements.push("1000");
        alert("🏆 Achievement: 1000 poäng!");
    }

    if(score>=10000 && !achievements.includes("10000")){
        achievements.push("10000");
        alert("🏆 Achievement: 10000 poäng!");
    }
}

// 🎁 daily reward
function dailyReward(){
    let last = localStorage.getItem("daily");

    let now = Date.now();

    if(!last || now - last > 86400000){
        score += 5000;
        localStorage.setItem("daily", now);
        alert("🎁 Du fick 5000 poäng!");
        updateUI();
    } else {
        alert("Kom tillbaka imorgon!");
    }
}

// 💾 save/load
function saveGame(){
    localStorage.setItem("score",score);
    localStorage.setItem("speed",spinSpeed);
    localStorage.setItem("auto",autoSpeed);
    localStorage.setItem("skin",currentSkin);
    localStorage.setItem("owned",JSON.stringify(ownedSkins));
    localStorage.setItem("ach",JSON.stringify(achievements));
    alert("Sparat!");
}

function loadGame(){
    let s=localStorage.getItem("score");
    let sp=localStorage.getItem("speed");
    let au=localStorage.getItem("auto");
    let sk=localStorage.getItem("skin");
    let ow=localStorage.getItem("owned");
    let ac=localStorage.getItem("ach");

    if(s) score=parseInt(s);
    if(sp) spinSpeed=parseInt(sp);
    if(au) autoSpeed=parseInt(au);
    if(sk) currentSkin=sk;
    if(ow) ownedSkins=JSON.parse(ow);
    if(ac) achievements=JSON.parse(ac);

    updateUI();
    applySkin(currentSkin);
}

loadGame();
</script>

</body>
</html>
