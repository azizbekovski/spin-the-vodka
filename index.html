<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinning Vodka Bottle Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        #lobby {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        #bottle {
            width: 150px;
            height: 300px;
            background: url('path_to_vodka_bottle_image.png') no-repeat center / contain;
            margin: 20px;
        }
        #spinButton {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="lobby">
        <h1>Spinning Vodka Bottle Game</h1>
        <button id="spinButton">Spin the Bottle!</button>
    </div>
    <div id="bottle" class="hidden"></div>
    <script>
        const spinButton = document.getElementById('spinButton');
        const bottle = document.getElementById('bottle');
        let isSpinning = false;

        spinButton.addEventListener('click', function() {
            if (!isSpinning) {
                isSpinning = true;
                bottle.classList.remove('hidden');
                const spinDuration = Math.random() * 5000 + 3000; // Spin between 3s and 8s
                bottle.style.transition = `transform ${spinDuration}ms ease-out`;
                const randomAngle = Math.random() * 360;
                bottle.style.transform = `rotate(${randomAngle}deg)`;
                setTimeout(() => {
                    alert('Bottle stopped!');
                    isSpinning = false;
                }, spinDuration);
            }
        });
    </script>
</body>
</html>
