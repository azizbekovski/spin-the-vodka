<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flaskspel PRO</title>

<style>
body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Arial;
    background: linear-gradient(to right, #4facfe, #00f2fe);
}

#bottle {
    width: 100px;
    height: 200px;
    background: #ffcc00;
    border-radius: 10px;
    transition: 0.2s;
}

#score {
    color: white;
    font-size: 24px;
    margin: 10px;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.shop {
    margin-top: 20px;
    background: rgba(255,255,255,0.2);
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div id="bottle" onclick="spinBottle()"></div>
<div id="score">Poäng: 0</div>

<div class="shop">
<h3>🚀 Upgrades</h3>
<button onclick="buyUpgrade(10,1)">+1 (10)</button>
<button onclick="buyUpgrade(20,5)">+5 (20)</button>
<button onclick="buyUpgrade(50,15)">+15 (50)</button>
</div>

<div class="shop">
<h3>🎨 Skins Shop</h3>
<button id="greenBtn" onclick="buySkin('green',15000)">Grön (15k)</button>
<button id="pinkBtn" onclick="buySkin('pink',20000)">Rosa (20k)</button>
<button id="blackBtn" onclick="buySkin('black',25000)">Svart (25k)</button>
</div>

<button onclick="saveGame()">💾 Spara</button>

<script>
let score = 0;
let spinSpeed = 1;
let currentSkin = "yellow";
let ownedSkins = ["yellow"];

// 🔊 Ljud
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playClickSound(){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value = 600;
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

function updateScore(){
    document.getElementById("score").innerText = "Poäng: " + score;
}

function spinBottle(){
    playClickSound();
    score += spinSpeed;
    updateScore();

    document.getElementById("bottle").style.transform =
        "rotate(" + (Math.random()*360) + "deg)";
}

// 🚀 Upgrade
function buyUpgrade(cost, power){
    if(score >= cost){
        score -= cost;
        spinSpeed += power;
        updateScore();
    }
}

// 🎨 Skin system
function updateSkin(){
    const bottle = document.getElementById("bottle");

    bottle.style.boxShadow = "0 0 20px white";

    if(currentSkin === "green"){
        bottle.style.background = "green";
        bottle.style.boxShadow = "0 0 20px green";
    }
    else if(currentSkin === "pink"){
        bottle.style.background = "pink";
        bottle.style.boxShadow = "0 0 20px pink";
    }
    else if(currentSkin === "black"){
        bottle.style.background = "black";
        bottle.style.boxShadow = "0 0 20px white";
    }
    else{
        bottle.style.background = "#ffcc00";
    }

    updateButtons();
}

function updateButtons(){
    const skins = ["green","pink","black"];

    skins.forEach(skin => {
        let btn = document.getElementById(skin+"Btn");

        if(ownedSkins.includes(skin)){
            if(currentSkin === skin){
                btn.innerText = skin + " (Equipped)";
            } else {
                btn.innerText = skin + " (Owned)";
            }
        }
    });
}

function buySkin(color, cost){
    if(ownedSkins.includes(color)){
        currentSkin = color;
        updateSkin();
        return;
    }

    if(score >= cost){
        score -= cost;
        ownedSkins.push(color);
        currentSkin = color;
        updateScore();
        updateSkin();
    } else {
        alert("Inte tillräckligt med poäng!");
    }
}

// 💾 Save / Load
function saveGame(){
    localStorage.setItem("score", score);
    localStorage.setItem("speed", spinSpeed);
    localStorage.setItem("skin", currentSkin);
    localStorage.setItem("owned", JSON.stringify(ownedSkins));
    alert("Sparat!");
}

function loadGame(){
    let s = localStorage.getItem("score");
    let sp = localStorage.getItem("speed");
    let sk = localStorage.getItem("skin");
    let ow = localStorage.getItem("owned");

    if(s) score = parseInt(s);
    if(sp) spinSpeed = parseInt(sp);
    if(sk) currentSkin = sk;
    if(ow) ownedSkins = JSON.parse(ow);

    updateScore();
    updateSkin();
}

loadGame();
</script>

</body>
</html>
