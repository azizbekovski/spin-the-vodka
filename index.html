<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flaskspel STABIL</title>

<style>
body {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:Arial;
    background:linear-gradient(to right,#4facfe,#00f2fe);
}

#bottle {
    width:100px;
    height:200px;
    border-radius:10px;
    background:#ffcc00;
    margin:10px;
}

#score,#stats,#level {
    color:white;
    font-size:20px;
}

button {
    margin:5px;
    padding:8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.shop {
    background:rgba(255,255,255,0.2);
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.inventory {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.skin {
    width:40px;
    height:60px;
    margin:5px;
    border-radius:5px;
    cursor:pointer;
    border:2px solid white;
}
</style>
</head>

<body>

<div id="bottle" onclick="spinBottle()"></div>

<div id="score">Poäng: 0</div>
<div id="stats">Auto/sec: 0</div>
<div id="level">Level: 1</div>

<!-- 🚀 -->
<div class="shop">
<h3>🚀 Upgrades</h3>
<button onclick="buyUpgrade(10,1)">+1</button>
<button onclick="buyUpgrade(200,50)">+50</button>
<button onclick="buyUpgrade(2000,500)">+500</button>
<button onclick="buyAuto()">Auto (50M)</button>
</div>

<!-- 🎁 -->
<div class="shop">
<h3>🎁 Case</h3>
<button onclick="openCase()">Öppna (67k)</button>
</div>

<!-- 🎒 INVENTORY -->
<div class="shop">
<h3>🎒 Inventory</h3>
<div id="inventory" class="inventory"></div>
</div>

<button onclick="saveGame()">💾 Spara</button>

<script>
let score=0;
let spinSpeed=1;
let autoSpeed=0;
let level=1;
let currentSkin="yellow";
let ownedSkins=["yellow"];

// 🎮 CLICK
function spinBottle(){
    score += spinSpeed * getMultiplier();
    rotateBottle();
    levelUp();
    updateUI();
}

// 🤖 AUTO
setInterval(()=>{
    score += autoSpeed * getMultiplier();
    levelUp();
    updateUI();
},1000);

// 🔄 rotation
function rotateBottle(){
    document.getElementById("bottle").style.transform =
        "rotate("+(Math.random()*360)+"deg)";
}

// ⭐ multiplier
function getMultiplier(){
    if(currentSkin==="gold") return 5;
    if(currentSkin==="whiteGlow") return 3;
    if(currentSkin!=="yellow") return 2;
    return 1;
}

// 🚀 upgrades
function buyUpgrade(cost,power){
    if(score>=cost){
        score-=cost;
        spinSpeed+=power;
        updateUI();
    }
}

// 🤖 auto
function buyAuto(){
    if(score>=50000000){
        score-=50000000;
        autoSpeed+=10;
        updateUI();
    }
}

// 🎁 case (stabil)
function openCase(){
    if(score<67000) return;

    score-=67000;

    const skins=["red","blue","whiteGlow","gold"];
    let reward=skins[Math.floor(Math.random()*skins.length)];

    if(!ownedSkins.includes(reward)){
        ownedSkins.push(reward);
    }

    currentSkin=reward;
    applySkin(reward);

    updateUI();
    renderInventory();
}

// 🎨 apply skin
function applySkin(skin){
    const b=document.getElementById("bottle");
    b.style.boxShadow="none";

    if(skin==="gold"){
        b.style.background="gold";
        b.style.boxShadow="0 0 20px gold";
    }
    else if(skin==="whiteGlow"){
        b.style.background="white";
        b.style.boxShadow="0 0 20px white";
    }
    else{
        b.style.background=skin;
    }
}

// 🎒 inventory UI
function renderInventory(){
    const inv=document.getElementById("inventory");
    inv.innerHTML="";

    ownedSkins.forEach(skin=>{
        let div=document.createElement("div");
        div.className="skin";
        div.style.background=skin;

        div.onclick=()=>{
            currentSkin=skin;
            applySkin(skin);
        };

        inv.appendChild(div);
    });
}

// 🌍 level
function levelUp(){
    let newLevel=Math.floor(score/1000)+1;
    if(newLevel>level){
        level=newLevel;
    }
}

// UI
function updateUI(){
    document.getElementById("score").innerText="Poäng: "+score;
    document.getElementById("stats").innerText="Auto/sec: "+autoSpeed;
    document.getElementById("level").innerText="Level: "+level;
}

// 💾 save/load
function saveGame(){
    localStorage.setItem("score",score);
    localStorage.setItem("speed",spinSpeed);
    localStorage.setItem("auto",autoSpeed);
    localStorage.setItem("skins",JSON.stringify(ownedSkins));
    localStorage.setItem("current",currentSkin);
}

function loadGame(){
    score=parseInt(localStorage.getItem("score"))||0;
    spinSpeed=parseInt(localStorage.getItem("speed"))||1;
    autoSpeed=parseInt(localStorage.getItem("auto"))||0;
    ownedSkins=JSON.parse(localStorage.getItem("skins"))||["yellow"];
    currentSkin=localStorage.getItem("current")||"yellow";

    applySkin(currentSkin);
    updateUI();
    renderInventory();
}

loadGame();
</script>

</body>
</html>
