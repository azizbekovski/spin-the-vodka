<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Flaskspel Ultra Smooth</title>

<style>
body {
    margin:0;
    font-family:Arial;
    text-align:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

/* BOTTLE */
#bottle {
    width:110px;
    height:210px;
    margin:30px auto;
    border-radius:15px;
    background:gold;
    box-shadow:0 0 25px gold;
    cursor:pointer;
    transition:0.1s;
}

/* PANELS */
.panel {
    background:rgba(255,255,255,0.05);
    padding:10px;
    margin:10px;
    border-radius:12px;
}

/* BUTTONS */
button {
    margin:4px;
    padding:6px 10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#38bdf8;
    color:black;
    font-weight:bold;
    transition:0.2s;
}

button:hover {
    transform:scale(1.05);
}

/* SCROLL LISTS */
.scroll {
    max-height:150px;
    overflow-y:auto;
}

/* INVENTORY */
.skin {
    width:35px;
    height:50px;
    margin:3px;
    display:inline-block;
    border:2px solid white;
    border-radius:5px;
    cursor:pointer;
}
.active {border:3px solid red;}

/* PROGRESS */
#progress {height:15px;background:#222;border-radius:10px;margin:10px;}
#bar {height:100%;width:0%;background:lime;}
</style>
</head>

<body>

<h2>🔥 Flaskspel Ultra Smooth</h2>

<div id="bottle" onclick="clickBottle()"></div>

<div id="score">0</div>
<div id="level">Level 1</div>

<div id="progress"><div id="bar"></div></div>

<div class="panel">
<h3>🚀 Upgrades (x4 power)</h3>
<div id="upgrades" class="scroll"></div>
</div>

<div class="panel">
<h3>🤖 Auto (20 upgrades)</h3>
<div id="autos" class="scroll"></div>
</div>

<div class="panel">
<h3>🎁 Case</h3>
<button onclick="openCase()">Öppna (50k)</button>
</div>

<div class="panel">
<h3>🎒 Inventory</h3>
<div id="inventory"></div>
</div>

<script>

// DATA
let score=0;
let clickPower=1;
let auto=0;
let level=1;

let skins=["gold"];
let current="gold";

let upgrades=[];
let autos=[];

// GENERATE 50 upgrades (x4 power)
for(let i=1;i<=50;i++){
    upgrades.push({
        cost:i*100,
        power:i*4   // 🔥 x4 power
    });
}

// GENERATE 20 auto upgrades
for(let i=1;i<=20;i++){
    autos.push({
        cost:i*1000,
        power:i*2
    });
}

// CLICK
function clickBottle(){
    score += clickPower;

    let b=document.getElementById("bottle");
    b.style.transform="scale(1.1)";
    setTimeout(()=>b.style.transform="scale(1)",80);

    update();
}

// AUTO LOOP (optimerad)
setInterval(()=>{
    score += auto;
    update();
},1000);

// RENDER UPGRADES
function renderUpgrades(){
    let div=document.getElementById("upgrades");
    div.innerHTML="";

    upgrades.forEach(u=>{
        let b=document.createElement("button");
        b.innerText="+"+u.power+" ("+u.cost+")";

        b.onclick=()=>{
            if(score>=u.cost){
                score-=u.cost;
                clickPower+=u.power;
                u.cost=Math.floor(u.cost*1.4);
                renderUpgrades();
                update();
            }
        };

        div.appendChild(b);
    });
}

// RENDER AUTOS
function renderAutos(){
    let div=document.getElementById("autos");
    div.innerHTML="";

    autos.forEach(a=>{
        let b=document.createElement("button");
        b.innerText="+"+a.power+"/s ("+a.cost+")";

        b.onclick=()=>{
            if(score>=a.cost){
                score-=a.cost;
                auto+=a.power;
                a.cost=Math.floor(a.cost*1.5);
                renderAutos();
                update();
            }
        };

        div.appendChild(b);
    });
}

// CASE
function openCase(){
    if(score<50000) return;

    score-=50000;

    let colors=["red","blue","green","purple","orange","pink","cyan"];
    let reward=colors[Math.floor(Math.random()*colors.length)];

    if(!skins.includes(reward)) skins.push(reward);

    current=reward;
    applySkin();
    renderInventory();
}

// APPLY SKIN
function applySkin(){
    let b=document.getElementById("bottle");
    b.style.background=current;
    b.style.boxShadow="0 0 25px "+current;
}

// INVENTORY
function renderInventory(){
    let inv=document.getElementById("inventory");
    inv.innerHTML="";

    skins.forEach(s=>{
        let d=document.createElement("div");
        d.className="skin";
        d.style.background=s;

        if(s===current) d.classList.add("active");

        d.onclick=()=>{
            current=s;
            applySkin();
            renderInventory();
        };

        inv.appendChild(d);
    });
}

// UPDATE UI
function update(){
    level=Math.floor(score/1000)+1;

    document.getElementById("score").innerText="Poäng: "+Math.floor(score);
    document.getElementById("level").innerText="Level "+level;

    let percent=(score%1000)/10;
    document.getElementById("bar").style.width=percent+"%";
}

// SAVE (optimerad)
setInterval(()=>{
    localStorage.setItem("save",JSON.stringify({
        score,clickPower,auto,skins,current,upgrades,autos
    }));
},3000);

// LOAD
let save=JSON.parse(localStorage.getItem("save")||"null");

if(save){
    score=save.score||0;
    clickPower=save.clickPower||1;
    auto=save.auto||0;
    skins=save.skins||["gold"];
    current=save.current||"gold";
    upgrades=save.upgrades||upgrades;
    autos=save.autos||autos;
}

applySkin();
renderInventory();
renderUpgrades();
renderAutos();
update();

</script>

</body>
</html>
