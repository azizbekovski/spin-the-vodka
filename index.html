<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flaskspel ULTRA</title>

<style>
body {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    font-family:Arial;
    background:linear-gradient(to right,#4facfe,#00f2fe);
    overflow:hidden;
}

#bottle {
    width:100px;
    height:200px;
    border-radius:10px;
    background:#ffcc00;
    transition:0.2s;
}

#score {
    color:white;
    font-size:24px;
    margin:10px;
}

button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.shop {
    margin-top:10px;
}

/* 🎰 Case animation */
#caseAnimation {
    display:none;
    overflow:hidden;
    width:320px;
    border:2px solid white;
    margin-top:10px;
}

#caseItems {
    display:flex;
    transition: transform 3s cubic-bezier(0.1,0.7,0.1,1);
}

.caseItem {
    min-width:100px;
    height:100px;
    margin:5px;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="bottle" onclick="spinBottle()"></div>
<div id="score">Poäng: 0</div>

<div class="shop">
<button onclick="buyUpgrade(10,1)">+1 (10)</button>
<button onclick="buyUpgrade(20,5)">+5 (20)</button>
<button onclick="buyUpgrade(50,15)">+15 (50)</button>
<button onclick="buyUpgrade(200,50)">+50 (200)</button>

<!-- 🆕 NYA -->
<button onclick="buyUpgrade(500,100)">+100 (500)</button>
<button onclick="buyUpgrade(2000,500)">+500 (2000)</button>
<button onclick="buyUpgrade(10000,2000)">+2000 (10000)</button>
</div>

<div class="shop">
<button onclick="openCase(67000)">🎁 Case (67k)</button>
<button onclick="saveGame()">💾 Spara</button>
</div>

<div id="caseAnimation">
    <div id="caseItems"></div>
</div>

<script>
let score = 0;
let spinSpeed = 1;
let currentSkin = "yellow";
let ownedSkins = ["yellow"];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function clickSound(){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 600;
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.1);
    osc.start();
    osc.stop(audioCtx.currentTime+0.1);
}

function updateScore(){
    document.getElementById("score").innerText = "Poäng: " + score;
}

function spinBottle(){
    clickSound();
    score += spinSpeed;
    updateScore();
    document.getElementById("bottle").style.transform =
        "rotate("+(Math.random()*360)+"deg)";
}

function buyUpgrade(cost,power){
    if(score>=cost){
        score-=cost;
        spinSpeed+=power;
        updateScore();
    }
}

function applySkin(skin){
    const b = document.getElementById("bottle");
    b.style.boxShadow="none";

    if(skin==="red") b.style.background="red";
    else if(skin==="blue") b.style.background="blue";
    else if(skin==="whiteGlow"){
        b.style.background="white";
        b.style.boxShadow="0 0 30px white";
    }
    else if(skin==="gold"){
        b.style.background="gold";
        b.style.boxShadow="0 0 40px gold";
    }
    else b.style.background="#ffcc00";
}

function openCase(cost){
    if(score < cost){
        alert("Inte tillräckligt!");
        return;
    }

    score -= cost;
    updateScore();

    const container = document.getElementById("caseAnimation");
    const itemsDiv = document.getElementById("caseItems");

    container.style.display = "block";
    itemsDiv.innerHTML = "";

    const skins = ["red","blue","whiteGlow","gold"];

    for(let i=0;i<20;i++){
        let skin = skins[Math.floor(Math.random()*skins.length)];
        let div = document.createElement("div");
        div.className="caseItem";

        if(skin==="red") div.style.background="red";
        if(skin==="blue") div.style.background="blue";
        if(skin==="whiteGlow"){
            div.style.background="white";
            div.style.boxShadow="0 0 10px white";
        }
        if(skin==="gold"){
            div.style.background="gold";
            div.style.boxShadow="0 0 10px gold";
        }

        div.dataset.skin=skin;
        itemsDiv.appendChild(div);
    }

    const winIndex = 15;
    const itemWidth = 110;

    itemsDiv.style.transform =
        "translateX(-"+(winIndex*itemWidth)+"px)";

    setTimeout(()=>{
        let winner = itemsDiv.children[winIndex].dataset.skin;

        if(!ownedSkins.includes(winner)){
            ownedSkins.push(winner);
        }

        currentSkin = winner;
        applySkin(winner);

        alert("Du fick: "+winner+"!");

        container.style.display="none";
        itemsDiv.style.transform="translateX(0)";
    },3000);
}

function saveGame(){
    localStorage.setItem("score",score);
    localStorage.setItem("speed",spinSpeed);
    localStorage.setItem("skin",currentSkin);
    localStorage.setItem("owned",JSON.stringify(ownedSkins));
    alert("Sparat!");
}

function loadGame(){
    let s=localStorage.getItem("score");
    let sp=localStorage.getItem("speed");
    let sk=localStorage.getItem("skin");
    let ow=localStorage.getItem("owned");

    if(s) score=parseInt(s);
    if(sp) spinSpeed=parseInt(sp);
    if(sk) currentSkin=sk;
    if(ow) ownedSkins=JSON.parse(ow);

    updateScore();
    applySkin(currentSkin);
}

loadGame();
</script>

</body>
</html>
