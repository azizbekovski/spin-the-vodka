<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flaskspel GOD+</title>

<style>
body {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    font-family:Arial;
    background:linear-gradient(to right,#4facfe,#00f2fe);
}

#bottle {
    width:100px;
    height:200px;
    border-radius:10px;
    background:#ffcc00;
}

#score,#stats,#level {
    color:white;
    font-size:20px;
    margin:5px;
}

button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
}

.shop {
    background:rgba(255,255,255,0.2);
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div id="bottle" onclick="spinBottle()"></div>
<div id="score">Poäng: 0</div>
<div id="stats">Auto/sec: 0</div>
<div id="level">Level: 1</div>

<!-- 🚀 -->
<div class="shop">
<h3>🚀 Upgrades</h3>
<button onclick="buyUpgrade(10,1)">+1</button>
<button onclick="buyUpgrade(200,50)">+50</button>
<button onclick="buyUpgrade(2000,500)">+500</button>
<button onclick="buyAuto()">🤖 Auto (50M)</button>
</div>

<!-- 🎁 -->
<div class="shop">
<h3>🎁 Case</h3>
<button onclick="openCase(67000)">Case</button>
</div>

<!-- ⚔️ -->
<div class="shop">
<h3>⚔️ Boss</h3>
<button onclick="fightBoss()">Fight Boss</button>
</div>

<!-- 💰 -->
<div class="shop">
<h3>💰 Sell skins</h3>
<button onclick="sellSkins()">Sälj alla skins</button>
</div>

<button onclick="saveGame()">💾 Save</button>

<script>
let score=0;
let spinSpeed=1;
let autoSpeed=0;
let level=1;
let currentSkin="yellow";
let ownedSkins=["yellow"];

// 🎮 CLICK
function spinBottle(){
    let mult = getMultiplier();
    score += spinSpeed * mult;
    levelUp();
    updateUI();
}

// 🤖 AUTO
setInterval(()=>{
    score += autoSpeed * getMultiplier();
    levelUp();
    updateUI();
},1000);

// ⭐ multipliers
function getMultiplier(){
    if(currentSkin==="gold") return 5;
    if(currentSkin==="whiteGlow") return 3;
    if(currentSkin!=="yellow") return 2;
    return 1;
}

// 🚀 upgrades
function buyUpgrade(cost,power){
    if(score>=cost){
        score-=cost;
        spinSpeed+=power;
    }
}

// 🤖 auto
function buyAuto(){
    if(score>=50000000){
        score-=50000000;
        autoSpeed+=10;
    }
}

// 🎰 case
function openCase(cost){
    if(score<cost)return;

    score-=cost;

    const skins=["red","blue","whiteGlow","gold"];
    let reward=skins[Math.floor(Math.random()*skins.length)];

    if(!ownedSkins.includes(reward)){
        ownedSkins.push(reward);
    }

    currentSkin=reward;
    applySkin(reward);

    alert("Fick: "+reward);
}

// 🎨 skin
function applySkin(skin){
    let b=document.getElementById("bottle");

    if(skin==="gold"){
        b.style.background="gold";
    }
    else if(skin==="whiteGlow"){
        b.style.background="white";
    }
    else{
        b.style.background=skin;
    }
}

// ⚔️ boss
function fightBoss(){
    let bossHP = level * 1000;

    let damage = spinSpeed * getMultiplier();

    if(damage > bossHP){
        score += bossHP;
        alert("Boss defeated!");
    } else {
        alert("För svag!");
    }
}

// 🌍 level
function levelUp(){
    let newLevel = Math.floor(score / 1000) + 1;
    if(newLevel > level){
        level = newLevel;
        alert("LEVEL UP!");
    }
}

// 💰 sell skins
function sellSkins(){
    let value = ownedSkins.length * 5000;
    score += value;
    ownedSkins = ["yellow"];
    currentSkin="yellow";
    applySkin("yellow");
    alert("Sålde skins för "+value);
}

// UI
function updateUI(){
    document.getElementById("score").innerText="Poäng: "+score;
    document.getElementById("stats").innerText="Auto/sec: "+autoSpeed;
    document.getElementById("level").innerText="Level: "+level;
}

// save
function saveGame(){
    localStorage.setItem("score",score);
    localStorage.setItem("speed",spinSpeed);
    localStorage.setItem("auto",autoSpeed);
    localStorage.setItem("level",level);
}

// load
function loadGame(){
    score=parseInt(localStorage.getItem("score"))||0;
    spinSpeed=parseInt(localStorage.getItem("speed"))||1;
    autoSpeed=parseInt(localStorage.getItem("auto"))||0;
    level=parseInt(localStorage.getItem("level"))||1;
    updateUI();
}

loadGame();
</script>

</body>
</html>
