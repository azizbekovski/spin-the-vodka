<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flaskspel ULTIMATE</title>

<style>
body {
    margin:0;
    font-family:Arial;
    text-align:center;
    background:#222;
    color:white;
}

/* MENU */
#menu {
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* GAME */
#game {
    display:none;
}

#bottle {
    width:100px;
    height:200px;
    margin:20px auto;
    border-radius:10px;
    background:gold;
    transition:0.1s;
}

.shop, .panel {
    background:#333;
    padding:10px;
    margin:10px;
    border-radius:10px;
}

button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#inventory {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.skin {
    width:40px;
    height:60px;
    margin:5px;
    border:2px solid white;
}

.active {
    border:3px solid red;
}
</style>
</head>

<body>

<!-- START MENU -->
<div id="menu">
    <button onclick="startGame()">▶️ Start Game</button>
</div>

<!-- GAME -->
<div id="game">

<div id="bottle" onclick="clickBottle()"></div>

<div id="score">Poäng: 0</div>
<div id="level">Level: 1</div>
<div id="auto">Auto/sec: 0</div>
<div id="multi">Multiplier: x1</div>

<!-- SHOP -->
<div class="shop">
<h3>🚀 Upgrades</h3>
<button onclick="buyUpgrade()">Upgrade</button>

<h3>🤖 Auto</h3>
<button onclick="buyAuto()">Auto</button>
</div>

<!-- CASE -->
<div class="shop">
<h3>🎁 Case</h3>
<button onclick="openCase()">Öppna (67k)</button>
</div>

<!-- INVENTORY -->
<div class="panel">
<h3>🎒 Inventory</h3>
<div id="inventory"></div>
</div>

<!-- SETTINGS -->
<div class="panel">
<button onclick="toggleTheme()">🎨 Theme</button>
<button onclick="prestige()">💎 Prestige</button>
</div>

</div>

<script>
// GAME DATA
let score = 0;
let spin = 1;
let auto = 0;
let level = 1;

let upgradeCost = 10;
let autoCost = 1000;

let currentSkin = "gold";
let ownedSkins = ["gold"];

let dark = true;

// START GAME
function startGame(){
    document.getElementById("menu").style.display="none";
    document.getElementById("game").style.display="block";
}

// CLICK
function clickBottle(){
    score += spin * getMultiplier();
    animate();
    updateUI();
}

// ANIMATION
function animate(){
    let b = document.getElementById("bottle");
    b.style.transform="scale(1.2)";
    setTimeout(()=>b.style.transform="scale(1)",100);
}

// AUTO LOOP
setInterval(()=>{
    score += auto * getMultiplier();
    updateUI();
},1000);

// MULTIPLIER
function getMultiplier(){
    if(currentSkin==="rainbow") return 10;
    if(currentSkin==="gold") return 5;
    if(currentSkin!=="gold") return 2;
    return 1;
}

// BUY UPGRADE
function buyUpgrade(){
    if(score >= upgradeCost){
        score -= upgradeCost;
        spin += 1;
        upgradeCost = Math.floor(upgradeCost * 1.5);
        updateUI();
    }
}

// BUY AUTO
function buyAuto(){
    if(score >= autoCost){
        score -= autoCost;
        auto += 1;
        autoCost = Math.floor(autoCost * 1.7);
        updateUI();
    }
}

// CASE SYSTEM
function openCase(){
    if(score < 67000) return;

    score -= 67000;

    let r = Math.random();
    let reward;

    if(r < 0.5) reward = "red";
    else if(r < 0.8) reward = "blue";
    else if(r < 0.95) reward = "gold";
    else reward = "rainbow";

    if(!ownedSkins.includes(reward)){
        ownedSkins.push(reward);
    }

    currentSkin = reward;
    applySkin();
    renderInventory();
    updateUI();
}

// APPLY SKIN
function applySkin(){
    let b = document.getElementById("bottle");

    if(currentSkin==="rainbow"){
        b.style.background="linear-gradient(red,blue)";
    } else {
        b.style.background=currentSkin;
    }
}

// INVENTORY
function renderInventory(){
    let inv = document.getElementById("inventory");
    inv.innerHTML = "";

    ownedSkins.forEach(skin=>{
        let div = document.createElement("div");
        div.className="skin";
        div.style.background=skin;

        if(skin === currentSkin){
            div.classList.add("active");
        }

        div.onclick=()=>{
            currentSkin = skin;
            applySkin();
            renderInventory();
        };

        inv.appendChild(div);
    });
}

// THEME
function toggleTheme(){
    dark = !dark;
    document.body.style.background = dark ? "#222" : "#eee";
    document.body.style.color = dark ? "white" : "black";
}

// PRESTIGE
function prestige(){
    if(score >= 100000){
        score = 0;
        spin = 1;
        auto = 0;
        level++;
        updateUI();
    }
}

// UPDATE UI
function updateUI(){
    document.getElementById("score").innerText="Poäng: "+Math.floor(score);
    document.getElementById("auto").innerText="Auto/sec: "+auto;
    document.getElementById("multi").innerText="Multiplier: x"+getMultiplier();

    level = Math.floor(score / 1000) + 1;
    document.getElementById("level").innerText="Level: "+level;
}

// SAVE
setInterval(()=>{
    localStorage.setItem("score",score);
},5000);

// LOAD
score = parseInt(localStorage.getItem("score")) || 0;

applySkin();
renderInventory();
updateUI();
</script>

</body>
</html>
